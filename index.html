<style>
:root{--bg:#f6f7f9;--card:#ffffff;--line:#e2e6ec;--fg:#1a1d23;--mut:#5c6672;--acc:#2563eb;--good:#1a9d63;--warn:#b26a12;--field:#fbfcfd}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--fg);font:14px/1.5 system-ui,Segoe UI,Roboto,sans-serif}
.wrap{max-width:1080px;margin:0 auto;padding:24px 18px 60px}
h1{font-size:20px;margin:0 0 4px}
.sub{color:var(--mut);margin:0 0 20px;font-size:13px}
.lead{color:var(--mut);font-size:13px;line-height:1.55;margin:0 0 16px;max-width:72ch}
.lead p{margin:0 0 8px}.lead p:last-child{margin:0;font-size:12px}
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:14px}
label{display:block;font-size:12px;color:var(--mut);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
textarea{width:100%;min-height:110px;background:var(--field);color:var(--fg);border:1px solid var(--line);border-radius:8px;padding:10px;font:13px/1.5 ui-monospace,Menlo,monospace;resize:vertical}
.row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-top:12px}
button{background:var(--acc);color:#fff;border:0;border-radius:8px;padding:9px 18px;font-weight:600;cursor:pointer;font-size:14px}
input[type=number]{width:64px;background:var(--field);color:var(--fg);border:1px solid var(--line);border-radius:6px;padding:6px}
.pred{display:flex;gap:20px;flex-wrap:wrap;align-items:baseline}
.bc{font:16px/1.4 ui-monospace,monospace;color:var(--good);word-break:break-word}
.bc a{color:inherit;}
.bc a:hover{color:var(--acc)}
.pill{display:inline-block;padding:2px 8px;border:1px solid var(--line);border-radius:999px;font-size:12px;color:var(--mut)}
.grid{display:grid;grid-template-columns:auto 1fr;gap:4px 14px;font-size:13px;margin-top:10px}
.grid b{color:var(--mut);font-weight:500}
.votes{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{text-align:left;padding:6px 8px;border-bottom:1px solid var(--line);white-space:nowrap}
th{color:var(--mut);font-weight:500;position:sticky;top:0;background:var(--card)}
td.h{font-family:ui-monospace,monospace;color:var(--acc);white-space:normal;overflow-wrap:anywhere;word-break:break-word;min-width:140px;max-width:280px}
.who{white-space:normal;min-width:140px;max-width:260px}
.sub2{color:var(--mut);font-size:12px}
.tablewrap{overflow-x:auto}
.mut{color:var(--mut)}
.po{display:block;font-size:9px;line-height:1.3;text-transform:uppercase;letter-spacing:.04em;color:var(--warn);white-space:nowrap}
.err{color:#ff7676}
.mono{font-family:ui-monospace,monospace}
.kitlink{color:var(--acc);text-decoration:none;border-bottom:1px dotted var(--acc);cursor:pointer}
.kitlink:hover{border-bottom-style:solid}
.sharebtn{background:transparent;color:var(--acc);border:1px solid var(--acc);border-radius:8px;padding:7px 14px;font-weight:600;font-size:13px;cursor:pointer}
.sharebtn:hover{background:var(--acc);color:#fff}
.cp{background:transparent;border:0;padding:0 2px;font-size:13px;line-height:1;cursor:pointer;opacity:.65;vertical-align:middle}
.cp:hover{opacity:1}
.help{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;margin-left:5px;border-radius:50%;border:1px solid var(--line);color:var(--mut);font-size:10px;line-height:1;cursor:pointer;vertical-align:middle;user-select:none}
.help:hover{border-color:var(--acc);color:var(--acc)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;padding:20px;z-index:9999}
.modal-overlay.open{display:flex}
.modal{background:var(--card);color:var(--fg);border:1px solid var(--line);border-radius:12px;max-width:440px;width:100%;padding:20px 22px;position:relative;box-shadow:0 10px 40px rgba(0,0,0,.25)}
.modal h3{margin:0 0 10px;font-size:16px}
.modal p{margin:0;font-size:14px;line-height:1.55;color:var(--fg)}
.modal-x{position:absolute;top:8px;right:12px;background:transparent;border:0;color:var(--mut);font-size:24px;line-height:1;cursor:pointer;padding:0;width:auto;font-weight:400}
.modal-x:hover{color:var(--fg)}
.hint{font-size:12px;color:var(--mut);margin-top:6px}
.langsw{float:right;font-size:12px}
.lang{background:transparent;border:0;color:var(--mut);cursor:pointer;padding:2px 4px;font-weight:600}
.lang.active{color:var(--acc)}
.install{display:flex;gap:10px;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:14px}
.install-txt{flex:1;font-size:13px}
.toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%) translateY(20px);background:#1a1d23;color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;opacity:0;transition:.3s;z-index:10000}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

html.tg{--bg:var(--tg-theme-bg-color,#f6f7f9);--card:var(--tg-theme-secondary-bg-color,#ffffff);--field:var(--tg-theme-secondary-bg-color,#fbfcfd);--fg:var(--tg-theme-text-color,#1a1d23);--mut:var(--tg-theme-hint-color,#5c6672);--line:var(--tg-theme-section-separator-color,#e2e6ec);--acc:var(--tg-theme-button-color,#2563eb)}
html.tg .card{box-shadow:none}

#tgdbg{position:fixed;left:0;right:0;top:0;z-index:99999;font:11px/1.35 ui-monospace,Menlo,monospace}
#tgdbg-head{background:#7c3aed;color:#fff;padding:4px 8px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#tgdbg-log{display:none;margin:0;max-height:38vh;overflow:auto;background:rgba(0,0,0,.85);color:#7CFC7C;padding:6px 8px;white-space:pre-wrap;word-break:break-word}
#tgdbg.open #tgdbg-log{display:block}
@media(max-width:560px){
.card{padding:12px 13px}
.tablewrap{overflow-x:visible}
thead{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
table,tbody{display:block}
tr{display:block;border:1px solid var(--line);border-radius:8px;margin-bottom:8px;padding:7px 10px;font-size:12px;line-height:1.5}
td{display:inline;border:0;padding:0;white-space:normal}
td[data-label='Kit']{font-weight:600;font-family:ui-monospace,monospace}
td[data-label='Проект']{color:var(--mut)}
td[data-label='Проект']::before{content:' · '}
td.h{color:var(--acc)}
td.h::before{content:' '}
td.h::after{content:'\A';white-space:pre}
td[data-label='TMRCA']::before{content:'TMRCA ';color:var(--mut)}
td[data-label='diff/cmp']::before{content:' · diff/cmp ';color:var(--mut)}
td[data-label='Маркеров']::before{content:' · ';color:var(--mut)}
.po{display:inline;padding:0 3px}

window.__I18N={"ru":{"appTitle":"Предиктор гаплогруппы Y-DNA","metaDesc":"Онлайн-предиктор гаплогруппы Y-DNA по STR-маркерам FamilyTreeDNA: ближайшие совпаденцы и предсказанная ветвь по Y-дереву за секунды. Без регистрации.","introLead":"Вставь STR-маркеры Y-DNA (FamilyTreeDNA) — предиктор найдёт ближайших совпаденцев в корпусе и предскажет ветвь гаплогруппы, спускаясь по Y-дереву голосованием соседей.","introCaveat":"Предсказание вероятностное. На неглубоких, редких или пограничных ветвях возможны неточности — это нормально для оценки по STR. Точную гаплогруппу подтверждает только SNP-тест (BigY и аналоги).","markersLabel":"STR-маркеры (пробел/запятая/перенос; палиндромы вида {ex}) — или Kit-номер из корпуса","markersPlaceholder":"13 24 13 10 15-17 11 …","btnPredict":"Предсказать","neighborsWord":"Соседей:","mkhint":"порядок маркеров: {order} … · корпус: {n} китов","haploLabel":"Гаплогруппа:","depth":"глубина","depthVal":"{n} узлов","confidence":"уверенность","confidenceVal":"{n}% голосов ветки","mode":"режим","modeClade":"clade-anchored {clade}, прокси {kit}","modePlain":"обычный предикт","reliable":"надёжно?","reliableYes":"да","reliableNo":"неглубоко/размыто","votes":"голоса","votesOther":"прочее:","corpusHint":"твоих маркеров: {my} · сравнилось китов: {matched} · голосовало (топ): {top}","shareBtn":"🔗 Поделиться","shareCopied":"✓ ссылка скопирована","shareFail":"⚠️ не вышло","neighborsTitle":"Ближайшие соседи (по возрасту TMRCA)","thKit":"Kit","thProject":"Проект","thHaplo":"Гаплогруппа","thTmrca":"TMRCA","thDiff":"diff/cmp","thMarkers":"марк.","years":"лет","predictorOnly":"predictor only","errNoMarkers":"Нет маркеров","errKitNotFound":"Кит «{kit}» не найден в корпусе","calculating":"Считаю…","errNoPrediction":"Предсказание не построено (нет валидных соседей).","copyMarkersTitle":"скопировать маркеры","modalClose":"закрыть","shareText":"Y-DNA предиктор: гаплогруппа {haplo} (глубина {depth}, уверенность {conf}%{tail})","shareTailUnsure":", неглубоко/размыто","shareTitle":"Предиктор гаплогруппы Y-DNA","installBtn":"Установить приложение","installIos":"Установка: кнопка «Поделиться» → «На экран «Домой»»","installDismiss":"Скрыть","updatedToast":"Обновлено до версии {v}","helpDepthTitle":"Глубина","helpDepthBody":"Сколько узлов Y-дерева предиктор прошёл от корня до предсказанной ветви. Больше узлов — конкретнее ветвь. Малая глубина значит, что уверенно определяется только верхний уровень дерева.","helpConfTitle":"Уверенность","helpConfBody":"Доля голосов ближайших соседей, пришедшаяся на выбранную ветвь (вес голоса тем больше, чем ближе сосед). Высокий процент — соседи согласованно указывают на одну и ту же ветвь; низкий — голоса размазаны по нескольким.","helpModeTitle":"Режим","helpModeBody":"«Clade-anchored» — если ближайший сосед принадлежит известной кладе (J1-Z1842 или J2-M172), предсказание строится только по её членам с настройками, откалиброванными под наши популяции (точнее). «Обычный предикт» — вне известных клад, голосуют все соседи.","helpReliableTitle":"Надёжно?","helpReliableBody":"Эвристика достоверности. «Да» — ветвь достаточно глубокая (≥3 узлов) и хорошо поддержана (много голосов или высокая уверенность). «Неглубоко/размыто» — предсказание есть, но верхнеуровневое либо голоса размыты; трактуй осторожно.","helpVotesTitle":"Голоса соседей по кладам","helpVotesBody":"Сколько из топ-соседей (отсортированных по возрасту TMRCA) попадают в каждую крупную кладу. Показывает, к какой ветви тяготеет твой гаплотип. «Прочее» — соседи вне J1-Z1842 и J2-M172.","helpCorpusTitle":"Объём расчёта","helpCorpusBody":"«Твоих маркеров» — сколько STR ты ввёл. «Сравнилось китов» — размер корпуса, с которым сверились. «Голосовало (топ)» — сколько ближайших соседей реально участвовали в голосовании за ветвь (после фильтров клады и ограничения topK)."},"en":{"appTitle":"Y-haplogroup predictor","metaDesc":"Online Y-DNA haplogroup predictor from FamilyTreeDNA STR markers: closest matches and predicted branch down the Y-tree in seconds. No signup.","introLead":"Paste your Y-DNA STR markers (FamilyTreeDNA) — the predictor finds your closest matches in the corpus and predicts a haplogroup branch by descending the Y-tree through neighbor voting.","introCaveat":"The prediction is probabilistic. On shallow, rare or borderline branches errors are possible — that is normal for STR-based estimates. Only a SNP test (BigY and similar) confirms the exact haplogroup.","markersLabel":"Y-DNA STR markers (space/comma/newline; palindromes like {ex}) — or a corpus Kit number","markersPlaceholder":"13 24 13 10 15-17 11 …","btnPredict":"Predict","neighborsWord":"Neighbors:","mkhint":"marker order: {order} … · corpus: {n} kits","haploLabel":"Haplogroup:","depth":"depth","depthVal":"{n} nodes","confidence":"confidence","confidenceVal":"{n}% of branch votes","mode":"mode","modeClade":"clade-anchored {clade}, proxy {kit}","modePlain":"plain prediction","reliable":"reliable?","reliableYes":"yes","reliableNo":"shallow/diffuse","votes":"votes","votesOther":"other:","corpusHint":"your markers: {my} · kits compared: {matched} · voted (top): {top}","shareBtn":"🔗 Share","shareCopied":"✓ link copied","shareFail":"⚠️ failed","neighborsTitle":"Closest neighbors (by TMRCA age)","thKit":"Kit","thProject":"Project","thHaplo":"Haplogroup","thTmrca":"TMRCA","thDiff":"diff/cmp","thMarkers":"mrk.","years":"yrs","predictorOnly":"predictor only","errNoMarkers":"No markers","errKitNotFound":"Kit “{kit}” not found in corpus","calculating":"Computing…","errNoPrediction":"No prediction (no valid neighbors).","copyMarkersTitle":"copy markers","modalClose":"close","shareText":"Y-DNA predictor: haplogroup {haplo} (depth {depth}, confidence {conf}%{tail})","shareTailUnsure":", shallow/diffuse","shareTitle":"Y-haplogroup predictor","installBtn":"Install app","installIos":"Install: the «Share» button → «Add to Home Screen»","installDismiss":"Dismiss","updatedToast":"Updated to version {v}","helpDepthTitle":"Depth","helpDepthBody":"How many Y-tree nodes the predictor traversed from the root to the predicted branch. More nodes — a more specific branch. Low depth means only the top level of the tree is confidently resolved.","helpConfTitle":"Confidence","helpConfBody":"Share of the closest neighbors' votes that fell on the chosen branch (a vote weighs more the closer the neighbor). A high percentage — neighbors agree on the same branch; low — votes are spread across several.","helpModeTitle":"Mode","helpModeBody":"«Clade-anchored» — if the closest neighbor belongs to a known clade (J1-Z1842 or J2-M172), the prediction is built only from its members with parameters calibrated for our populations (more accurate). «Plain prediction» — outside known clades, all neighbors vote.","helpReliableTitle":"Reliable?","helpReliableBody":"A confidence heuristic. «Yes» — the branch is deep enough (≥3 nodes) and well supported (many votes or high confidence). «Shallow/diffuse» — there is a prediction, but it is top-level or the votes are spread out; treat with caution.","helpVotesTitle":"Neighbor votes by clade","helpVotesBody":"How many of the top neighbors (sorted by TMRCA age) fall into each major clade. Shows which branch your haplotype leans toward. «Other» — neighbors outside J1-Z1842 and J2-M172.","helpCorpusTitle":"Computation scope","helpCorpusBody":"«Your markers» — how many STRs you entered. «Kits compared» — the size of the corpus checked against. «Voted (top)» — how many closest neighbors actually took part in the branch vote (after clade filters and the topK limit)."}};

const _EMPTY = { k: 0 };
function prepareMarkers(markers){
  const n = markers.length, prep = new Array(n);

    const s = String(markers[i]==null?"":markers[i]).replace(/ /g,"").replace(/^'/,"");

    } else { const num=Number(s); prep[i]=num>0?{k:1,num}:_EMPTY; }
  }
  return prep;
}
function findHaploDistPrep(pa, pb, mutationRates){
  const result={infDist:0,hybridDist:0,numData:0,muRate:0,muSum:0}, len=pa.length;
  for (let i=0;i<len;i++){
    const a=pa[i], b=pb[i]||_EMPTY;
    if (a.k===2||b.k===2){
      if (a.k===0||b.k===0) continue;
      const ca=a.k===2?a.cnt:new Map([[a.num,1]]), na=a.k===2?a.count:1;
      const cb=b.k===2?b.cnt:new Map([[b.num,1]]), nb=b.k===2?b.count:1;
      let hi=ca,lo=cb,hiCount=na; if(na<nb){hi=cb;lo=ca;hiCount=nb;}
      result.muSum+=mutationRates[i]*hiCount; result.numData+=hiCount;
      for (const [v,c] of hi){ const diff=c-(lo.get(v)||0); if(diff>0){result.infDist+=diff;result.hybridDist+=diff;} }
      continue;
    }
    if (a.k===1&&b.k===1){
      result.numData++; let val=Math.abs(a.num-b.num);
      if (i===10 && (pa[8]||_EMPTY).k===1 && (pb[8]||_EMPTY).k===1) val=Math.abs(a.num-pa[8].num-b.num+pb[8].num);
      result.muSum+=mutationRates[i]; if(val>0){result.infDist++;result.hybridDist+=val;}
    }
  }
  if (result.numData>0) result.muRate=result.muSum/result.numData;
  return result;
}


function logFactorial(n){ if(n<=1)return 0; let r=0; for(let i=2;i<=n;i++)r+=Math.log(i); return r; }
function cumProb0(mu,n,lamda,t){ return 1-Math.exp(-(2*mu*n+lamda)*t); }
function posteriorDensity(t,lamda,mu,k,n){
  if(k>n)return 0; const steps=n-k; let logNumer1=0;
  for(let i=0;i<=steps;i++){ const term=lamda+2*mu*(n-i); if(term<=0)return 0; logNumer1+=Math.log(term); }
  const logDenom1=steps*Math.log(2)+logFactorial(steps)+steps*Math.log(mu);
  const logNumer2=steps*Math.log(1-Math.exp(-2*mu*t)); const logDenom2=t*(2*mu*k+lamda);
  return Math.exp(logNumer1-logDenom1+logNumer2-logDenom2);
}
const _gm=new Map();
function calcGMRCA(n,dist,mu,probability){
  if(n-dist<0)return 300*(dist/n); if(dist*1.5>n)return 300*(dist/n);
  const key=n+"|"+dist+"|"+mu.toFixed(6)+"|"+probability; const c=_gm.get(key); if(c!==undefined)return c;
  const lamda=1/5000; let prev=0,cur=0,cumProb=0,prevCumProb=0,found=false; const k=n-dist; let generation=0;
  for(let i=1;i<200;i++){ const t=i;
    if(k<n){ cur=posteriorDensity(t,lamda,mu,k,n); cumProb+=(prev+cur)/2; } else { cumProb=cumProb0(mu,n,lamda,t); }
    if(cumProb>probability&&!found){ generation=Math.abs(prevCumProb-probability)<Math.abs(cumProb-probability)?i-1:i; found=true; }
    prev=cur; prevCumProb=cumProb; if(found)break; if(i>140)break;
  }
  const g=found?generation:300*(dist/n); _gm.set(key,g); return g;
}
function tmrcaPoint(numData,dist,muRate){ const mu=muRate>0?muRate:0.002; return calcGMRCA(numData,dist,mu,0.95)*30; }


function splitPrefixes(path){
  const segs=String(path).split("->").map(s=>s.trim()).filter(Boolean); const out=[]; let acc="";
  for(let i=0;i<segs.length;i++){ acc=i===0?segs[i]:acc+"->"+segs[i]; out.push(acc); } return out;
}
const depthOf=p=>String(p).split("->").length;


function cladeFlag(v,root){ const i=D.cladeRoots.indexOf(root); return i>=0 && (v.clmask&(1<<i))!==0; }
function predict(voters,opts){
  const o=Object.assign({minSupport:3,margin:1.2,topK:10,weightK:0.05,cladeFilter:null},opts);
  const score=new Map(),support=new Map(),children=new Map(); let total=0;
  let vs=voters.filter(v=>v.bc);
  if(o.cladeFilter) vs=vs.filter(v=>cladeFlag(v,o.cladeFilter));
  if(o.topK>0&&vs.length>o.topK) vs=vs.slice().sort((a,b)=>a.gd-b.gd).slice(0,o.topK);
  vs.forEach((nb,i)=>{
    const prefixes=splitPrefixes(nb.bc); if(!prefixes.length)return;
    const gd=nb.gd==null?null:Number(nb.gd); const w=gd!=null?1/(gd+o.weightK):1/(i+1); total+=w;
    for(let d=0;d<prefixes.length;d++){ const p=prefixes[d];
      score.set(p,(score.get(p)||0)+w); support.set(p,(support.get(p)||0)+1);
      if(d>0){ const parent=prefixes[d-1]; if(!children.has(parent))children.set(parent,new Set()); children.get(parent).add(p); }
    }
  });
  if(total===0)return null;
  const roots=[...score.keys()].filter(p=>depthOf(p)===1); if(!roots.length)return null;
  let current=roots.reduce((a,b)=>score.get(b)>score.get(a)?b:a);
  for(;;){ const kids=children.get(current); if(!kids||!kids.size)break;
    const sorted=[...kids].sort((a,b)=>score.get(b)-score.get(a)); const best=sorted[0], second=sorted[1]||null;
    if((support.get(best)||0)<o.minSupport)break; if(second&&score.get(best)<o.margin*score.get(second))break; current=best;
  }
  const depth=depthOf(current), sc=score.get(current), confidence=sc/total;
  return { haplogroup:current, depth, support:support.get(current), score:sc, total, confidence,
    confident: depth>=3 && (support.get(current)>=o.minSupport || confidence>=0.6) };
}







var ready = (async ()=>{
  D = await loadData(); RATES = D.rates;
  C = D.corpus.map(r=>({ kit:r[0], sheet:r[1], markers:r[2],
    prep:prepareMarkers(r[2]===""?[]:r[2].split(" ")), haplo:r[3], bc:r[4], clmask:r[5], mc:r[6], po:r[7] }));
  maxLen = C.reduce((mx,c)=>Math.max(mx,c.prep.length),0);
  KITMAP = new Map(C.map(c=>[String(c.kit).toUpperCase(), c.markers]));
  PROT_NODES = new Set(D.protectedNodes||[]);
  predExclude = new Set(D.predExclude);
  document.querySelector("#mkhint").textContent=fmt("mkhint",{order:D.markerNames.slice(0,12).join(", "), n:D.builtKits});
})();
function parseInput(raw){ return String(raw||"").trim().split(/[\s,;]+/).filter(t=>t!==""); }




function resolveInput(raw){
  const s=String(raw||"").trim();
  const whole=KITMAP.get(s.toUpperCase());
  if(whole!=null) return { markers: whole===""?[]:whole.split(" "), kit: s };
  const toks=parseInput(raw);
  if(toks.length===1 && /^[A-Za-z]{0,2}\d+$/.test(toks[0])) return { notFoundKit: toks[0] };
  return { markers: toks };
}

function run(markers, topN){
  const tp = prepareMarkers(markers);
  const rates = RATES.slice(0, Math.max(maxLen, tp.length));
  const scored=[];
  for(const c of C){
    const r=findHaploDistPrep(tp,c.prep,rates); if(r.numData===0)continue;
    const gd=r.infDist/(r.numData+1e-6); const tmrca=tmrcaPoint(r.numData,r.infDist,r.muRate);
    scored.push({kit:c.kit,sheet:c.sheet,po:c.po,markers:c.markers,haplo:c.haplo,bc:c.bc,clmask:c.clmask,mc:c.mc,gd,tmrca,infDist:r.infDist,numData:r.numData});
  }
  scored.sort((a,b)=>a.tmrca!==b.tmrca?a.tmrca-b.tmrca:a.gd!==b.gd?a.gd-b.gd:String(a.kit).localeCompare(String(b.kit)));
  let opts={}, cladeRoot=null, proxyKit=null;
  for(const nb of scored){ if(!nb.haplo)continue;
    for(const root of D.cladeRoots){ if(cladeFlag(nb,root)){ opts=Object.assign({cladeFilter:root},D.cladeOpts[root]||{}); cladeRoot=root; proxyKit=nb.kit; break; } }
    break;
  }
  const voters = scored.filter(n=>n.bc && !predExclude.has(n.sheet));
  const prediction = predict(voters, opts);
  const top = voters.slice(0,30);
  const cladeVotes={}; for(const root of D.cladeRoots) cladeVotes[root]=top.filter(n=>cladeFlag(n,root)).length;
  const otherVotes = top.length - Object.values(cladeVotes).reduce((a,b)=>a+b,0);
  return { myMarkers:markers.filter(x=>String(x).trim()!=="").length, matched:scored.length, cladeRoot, proxyKit,
    prediction, cladeVotes, otherVotes, topVoters:top.length, neighbors:scored.slice(0,topN) };
}

function termTok(s){ const i=String(s).indexOf("-"); return i===-1?String(s).trim():String(s).slice(i+1).trim(); }
function displayShort(path){
  const segs=String(path||"").split("->").map(s=>s.trim()).filter(Boolean);
  const n=segs.length; if(n<=2) return segs.join("->");
  const mids=[];
  for(let i=1;i<n-1;i++){ const t=termTok(segs[i]); const k=D.nodeKits[t]; mids.push({i,k:(k==null?null:k)}); }
  const floor=D.dispFloor||0, K=D.dispTopK||4;
  const keep=new Set(mids.filter(m=>m.k!=null&&(floor<=0||m.k>=floor)).sort((a,b)=>b.k-a.k).slice(0,K).map(m=>m.i));
  const out=[];
  for(let i=0;i<n;i++){
    if(i===0||i===n-1){ out.push(segs[i]); continue; }
    const t=termTok(segs[i]);
    if(PROT_NODES.has(t)||D.nodeKits[t]==null||keep.has(i)) out.push(segs[i]);
  }
  return out.join("->");
}
function linkHaplo(path){
  const segs=String(path||"").split("->");
  const lm=(segs[0]||"").trim().match(/^[A-Z]/); const L=lm?lm[0]:"";
  return segs.map((s,i)=>{
    const t=s.trim(); if(!t) return "";
    if(i===0||!L) return esc(t);
    const snp=t.replace(/^\s*[A-Z]-/,"");
    return '<a href="https://discover.familytreedna.com/y-dna/'+esc(L+"-"+snp)+'/tree" target="_blank" rel="noopener">'+esc(t)+'</a>';
  }).join("->");
}
